			    border-radius: 0.25rem;
			    font-size: 0.875rem;
			}
			.copy-btn:hover {
			    background-color: #eee;
			}
			
			/* Fade-in / fade-out carousel */
			.fade-carousel {
			    height: auto;
			    min-height: 5rem;
			    position: relative;
			    margin-bottom: 1rem;
			    font-family: monospace;
			}
			.fade-item {
			    position: absolute;
			    opacity: 0;
			    transition: opacity 0.5s ease-in-out;
			    width: 100%;
			}
			.fade-item.show {
			    opacity: 1;
			    position: relative;
			}

	<body class="p-4 font-sans">
		<h1 class="text-2xl mb-4">Unicode Dashboard</h1>
		<div id="easter-egg" class="fade-carousel"></div>
		<div id="unicode-container" class="details-container flex flex-wrap gap-4"></div>
<script>
/* -----------------------------
   Configuration
------------------------------ */

const unicodeFiles = [
  'assets/json/1f3a0_through_1F3BF.json',
  'assets/json/1f300_through_1F31F.json'
];

const glossaryFiles = [
  'assets/json/glossary_laravel.json',
  'assets/json/glossary_bash.json'
];

/* -----------------------------
   Utilities
------------------------------ */

async function loadJSON(url) {
  const res = await fetch(url);
  if (!res.ok) throw new Error(`Failed to load ${url}`);
  return res.json();
}

/* -----------------------------
   Unicode rendering
------------------------------ */

async function buildUnicodeMap() {
  const map = {};
  for (const file of unicodeFiles) {
    const data = await loadJSON(file);
    data.forEach(item => {
      map[item.code.toUpperCase()] = item.name;
    });
  }
  return map;
}

async function renderUnicodeBlocks() {
  const container = document.getElementById('unicode-container');
  const nameMap = await buildUnicodeMap();

  for (const file of unicodeFiles) {
    const data = await loadJSON(file);

    data.forEach(item => {
      const code = item.code.toUpperCase();
      const details = document.createElement('details');

      details.className = 'border rounded-lg p-2';
      details.innerHTML = `
        <summary>${item.glyph} ${nameMap[code] || 'Unknown'}</summary>
        <div class="mt-2 font-mono text-sm text-gray-600">
          <div>Code: U+${code}</div>
          <div>
            <span>${item.glyph}</span>
            <button class="copy-btn ml-2" data-copy="${item.glyph}">Copy</button>
          </div>
        </div>
      `;

      container.appendChild(details);
    });
  }
}

/* -----------------------------
   Glossary carousel (FIXED)
------------------------------ */

async function loadGlossary() {
  const laravel = [];
  const bash = [];

  for (const file of glossaryFiles) {
    const data = await loadJSON(file);
    const entries = Object.values(data.variables || data.terms || []);

    if (file.includes('laravel')) laravel.push(...entries);
    if (file.includes('bash')) bash.push(...entries);
  }

  return { laravel, bash };
}

async function initEasterEggCarousel() {
  const container = document.getElementById('easter-egg');
  const { laravel, bash } = await loadGlossary();

  const slides = [];

  function makeSlide(items) {
    const div = document.createElement('div');
    div.className = 'fade-item';
    div.innerHTML = items.map(i =>
      `<strong>${i.variable_name || i.term}</strong>: ${i.description}`
    ).join('<br>');
    container.appendChild(div);
    slides.push(div);
  }

  // deterministic pattern
  for (let i = 0; i < Math.max(laravel.length, bash.length); i++) {
    if (laravel[i]) makeSlide([laravel[i]]);
    if (laravel[i + 1]) makeSlide([laravel[i + 1]]);
    if (bash[i]) makeSlide([bash[i]]);
  }

  let index = 0;
  function showNext() {
    slides.forEach(s => s.classList.remove('show'));
    slides[index].classList.add('show');
    index = (index + 1) % slides.length;
  }

  showNext();
  setInterval(showNext, 4000);
}

/* -----------------------------
   Clipboard
------------------------------ */

document.addEventListener('click', e => {
  if (!e.target.classList.contains('copy-btn')) return;

  navigator.clipboard.writeText(e.target.dataset.copy);
  e.target.textContent = 'Copied!';
  setTimeout(() => (e.target.textContent = 'Copy'), 1000);
});

/* -----------------------------
   Boot
------------------------------ */

renderUnicodeBlocks()
  .then(initEasterEggCarousel)
  .catch(console.error);
</script>
