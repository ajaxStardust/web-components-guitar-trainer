
<!DOCTYPE html>
<html>

	<head>
		<meta charset="UTF-8">
		<title>Unicode Dashboard with Easter Egg</title>
		<script src="https://cdn.tailwindcss.com"></script>
		<style>
			/* Large glyph using first-letter */
			summary:first-letter {
			    font-size: 4rem;
			    float: left;
			    margin-right: 0.5rem;
			}
			
			/* Card hover */
			.details-container details:hover {
			    background-color: #f0f0f0;
			}
			
			/* Copy buttons */
			.copy-btn {
			    cursor: pointer;
			    padding: 0.25rem 0.5rem;
			    border: 1px solid #ccc;
			    border-radius: 0.25rem;
			    font-size: 0.875rem;
			}
			.copy-btn:hover {
			    background-color: #eee;
			}
			
			/* Fade-in / fade-out carousel */
			.fade-carousel {
			    height: auto;
			    min-height: 5rem;
			    position: relative;
			    margin-bottom: 1rem;
			    font-family: monospace;
			}
			.fade-item {
			    position: absolute;
			    opacity: 0;
			    transition: opacity 0.5s ease-in-out;
			    width: 100%;
			}
			.fade-item.show {
			    opacity: 1;
			    position: relative;
			}
		</style>

	<body class="p-4 font-sans">
		<h1 class="text-2xl mb-4">Unicode Dashboard</h1>
		<div id="easter-egg" class="fade-carousel"></div>
		<div id="unicode-container" class="details-container flex flex-wrap gap-4"></div>
		<script>
			// JSON files
			const unicodeFiles = [
			    'public/assets/json/1f3a0_through_1F3BF.json',
			    'public/assets/json/1f300_through_1F31F.json'
			];
			const glossaryFiles = [
			    'public/assets/json/glossary_bash.json',
			    'public/assets/json/glossary_laravel.json'
			];
			
			// Load JSON
			async function loadJSON(url) {
			    const res = await fetch(url);
			    return await res.json();
			}
			
			// Build Unicode lookup map
			async function buildUnicodeMap() {
			    const map = {};
			    for (const file of unicodeFiles) {
			        const data = await loadJSON(file);
			        data.forEach(item => {
			            map[item.code.toUpperCase()] = item.name;
			        });
			    }
			    return map;
			}
			
			// Render Unicode <details>
			async function renderUnicodeBlocks() {
			    const container = document.getElementById('unicode-container');
			    const nameMap = await buildUnicodeMap();
			    for (const file of unicodeFiles) {
			        const data = await loadJSON(file);
			        data.forEach(item => {
			            const code = item.code.toUpperCase();
			            const name = nameMap[code] || 'Unknown';
			            const details = document.createElement('details');
			            details.className = 'content-item card border rounded-lg p-2';
			            details.innerHTML = `
			                <summary>${item.glyph} ${name}</summary>
			                <div class="flex flex-col mt-2 gap-2 font-mono text-gray-600">
			                    <div>Code: ${code}</div>
			                    <div><code>&#x${code};</code> <button class="copy-btn" data-copy="&#x${code};">Copy</button></div>
			                </div>
			            `;
			            container.appendChild(details);
			        });
			    }
			}
			
			// Load and combine glossary
			async function loadGlossary() {
			    const combined = [];
			    for (const file of glossaryFiles) {
			        const data = await loadJSON(file);
			        const entries = Object.values(data.variables || data.terms || {});
			        combined.push(...entries);
			    }
			    return combined;
			}
			
			// Initialize fade carousel
			async function initEasterEggCarousel() {
			    const container = document.getElementById('easter-egg');
			    const items = await loadGlossary();
			
			    // Generate HTML elements for fade carousel
			    const nodes = [];
			    items.forEach((item, idx) => {
			        const div = document.createElement('div');
			        div.className = 'fade-item';
			        div.innerHTML = `<strong>${item.variable_name || item.term}</strong>: ${item.description} <em>Used for: ${item.used_for || ''}</em>`;
			        container.appendChild(div);
			        nodes.push(div);
			    });
			
			    // Rotate items: Laravel 2 → Bash 1 → Laravel 2 → Bash 1
			    let i = 0;
			    function showNext() {
			        nodes.forEach(n => n.classList.remove('show'));
			        let batch = [];
			        if (i % 3 === 0 || i % 3 === 1) batch = nodes.slice(i, i + 2); // Laravel
			        else batch = nodes.slice(i, i + 1); // Bash
			        batch.forEach(n => n.classList.add('show'));
			        i = (i + batch.length) % nodes.length;
			    }
			    showNext();
			    setInterval(showNext, 4000);
			}
			
			// Copy buttons
			document.addEventListener('click', e => {
			    if (e.target.matches('.copy-btn')) {
			        navigator.clipboard.writeText(e.target.dataset.copy);
			        e.target.textContent = 'Copied!';
			        setTimeout(() => e.target.textContent = 'Copy', 1000);
			    }
			});
			
			// Initial render
			renderUnicodeBlocks().then(initEasterEggCarousel);
		</script>
