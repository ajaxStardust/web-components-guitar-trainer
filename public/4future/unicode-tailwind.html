    <script>
      // Simple copy-to-clipboard functionality
      document.querySelectorAll('.copy-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          const text = btn.getAttribute('data-copy');
          navigator.clipboard.writeText(text).then(() => {
            btn.textContent = 'Copied!';
            setTimeout(() => btn.textContent = 'Copy', 1000);
          });
        });
      });
    </script>
    <script>
    document.addEventListener('DOMContentLoaded', () => {
      const container = document.querySelector('#pagewidth');

      // Lazy render expanded content when <details> opens
      container.addEventListener('toggle', (e) => {
        const details = e.target;
        if (!details.open) return; // Only on open
        const expanded = details.querySelector('.expanded-content');
        if (expanded && !expanded.hasChildNodes()) {
          // Insert the content from data attributes
          const glyph = details.dataset.glyph;
          const ncr = details.dataset.ncr;
          const name = details.dataset.name;
          const css = details.dataset.css;

          expanded.innerHTML = `
            <div class="glyph-large text-7xl">${glyph}</div>
            <div class="escapes font-mono text-gray-600 mt-1">${css}</div>
            <button class="copy-btn mt-2 px-2 py-1 text-sm bg-blue-500 text-white rounded hover:bg-blue-600 transition" data-copy="${css}">
              Copy CSS
            </button>
            <button class="copy-btn mt-2 px-2 py-1 text-sm bg-gray-300 text-gray-900 rounded hover:bg-gray-400 transition ml-2" data-copy="${ncr}">
              Copy NCR
            </button>
          `;
        }
      });

      // Delegated copy-to-clipboard listener
      container.addEventListener('click', (e) => {
        if (e.target.matches('.copy-btn')) {
          const value = e.target.dataset.copy;
          navigator.clipboard.writeText(value).then(() => {
            const oldText = e.target.textContent;
            e.target.textContent = 'Copied!';
            setTimeout(() => e.target.textContent = oldText, 1200);
          }).catch(console.error);
        }
      });
    });
    async function loadAllUnicode() {
      const container = document.getElementById('unicode-container');

      // Get a list of all JSON files
      const jsonFiles = [
        'public/assets/json/chars_u1F300_-_u1F31F.json',
        'public/assets/json/chars_u1F320_-_u1F33F.json'
        // Add more files or generate dynamically if server supports it
      ];

      for (const file of jsonFiles) {
        const res = await fetch(file);
        const data = await res.json();

        data.forEach(item => {
          const details = document.createElement('details');
          details.className = "content-item card float-left border rounded-lg mr-4 mb-4 p-2 hover:bg-gray-50 transition";

          const summary = document.createElement('summary');
          summary.className = "flex items-center gap-2 cursor-pointer text-lg font-semibold";
          summary.innerHTML = `${item.glyph} &amp;#x${item.code}; ${item.name}`;
          details.appendChild(summary);

          const expanded = document.createElement('div');
          expanded.className = "expanded-content flex flex-col items-center mt-2 space-y-2";

          const glyphLarge = document.createElement('div');
          glyphLarge.className = "glyph-large text-7xl";
          glyphLarge.textContent = item.glyph;
          expanded.appendChild(glyphLarge);

          const htmlEntity = document.createElement('div');
          htmlEntity.className = "flex items-center gap-2 font-mono text-gray-600";
          htmlEntity.innerHTML = `<code>&amp;#x${item.code};</code> <button class="copy-btn bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded text-sm" data-copy="&amp;#x${item.code};">Copy</button>`;
          expanded.appendChild(htmlEntity);

          const jsEscape = document.createElement('div');
          jsEscape.className = "flex items-center gap-2 font-mono text-gray-600";
          jsEscape.innerHTML = `<code>\\${item.code}</code> <button class="copy-btn bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded text-sm" data-copy="\\${item.code}">Copy</button>`;
          expanded.appendChild(jsEscape);

          details.appendChild(expanded);
          container.appendChild(details);
        });
      }
    }

    // Run
    loadAllUnicode();

    // Copy-to-clipboard functionality
    document.addEventListener('click', (e) => {
      if (e.target.matches('.copy-btn')) {
        const value = e.target.dataset.copy;
        navigator.clipboard.writeText(value).then(() => {
          const oldText = e.target.textContent;
          e.target.textContent = 'Copied!';
          setTimeout(() => e.target.textContent = oldText, 1200);
        }).catch(console.error);
      }
    });
    </script>
    <script>
    document.addEventListener('DOMContentLoaded', async () => {
      const container = document.querySelector('#pagewidth');

      // Load all JSON files in ./public/assets/json/
      const jsonFiles = [
        'chars_u1F300_-_u1F33F.json',
        'chars_u1F340_-_u1F37F.json',
        'chars_u1F300_-_u1F31F.json',
        'chars_u1F300_-_u1F30B.json',
        'chars_u1F380_-_u1F39F.json',
        'chars_u1F3A0_-_u1F3BF.json'
        // add other files here as needed
      ];

      for (const file of jsonFiles) {
        const response = await fetch(`/assets/json/${file}`);
        const glyphs = await response.json();

        glyphs.forEach(glyph => {
          const summaryText = "${glyph.char} &amp;amp#x${glyph.hex}; ${glyph.name}";
          const details = document.createElement('details');
          details.className = 'content-item card float-left border rounded-lg mr-4 mb-4 p-2 hover:bg-gray-50 transition';

          // Summary
          const summary = document.createElement('summary');
          summary.className = 'flex items-center gap-2 cursor-pointer text-lg font-semibold';
          summary.innerHTML = summaryText;

          // Expanded content
          const expanded = document.createElement('div');
          expanded.className = 'expanded-content flex flex-col items-center mt-2 space-y-2';
          expanded.innerHTML = `
            <div class="glyph-large text-7xl">${glyph.char}</div>
            <div class="flex items-center gap-2 font-mono text-gray-600">
              <code>${glyph.ncr}</code>
              <button class="copy-btn bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded text-sm" data-copy="${glyph.ncr}">Copy</button>
            </div>
            <div class="flex items-center gap-2 font-mono text-gray-600">
              <code>${glyph.css}</code>
              <button class="copy-btn bg-gray-200 hover:bg-gray-300 px-2 py-1 rounded text-sm" data-copy="${glyph.css}">Copy</button>
            </div>
          `;

          details.appendChild(summary);
          details.appendChild(expanded);
          container.appendChild(details);
        });
      }

      // Delegated copy-to-clipboard listener
      container.addEventListener('click', (e) => {
        if (e.target.matches('.copy-btn')) {
          const value = e.target.dataset.copy;
          navigator.clipboard.writeText(value).then(() => {
            const oldText = e.target.textContent;
            e.target.textContent = 'Copied!';
            setTimeout(() => e.target.textContent = oldText, 1200);
          }).catch(console.error);
        }
      });
    });
    </script>
