<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>String Bend Demo</title>
<style>
  body {
    background: #111;
    color: #eee;
    font-family: system-ui, sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 20px;
  }
  h1 { font-size: 1.2rem; }
</style>
</head>
<body>
<h1>Simulated Guitar String Bend</h1>

<guitar-string-bend-demo></guitar-string-bend-demo>

<script type="module">
class GuitarStringBendDemo extends HTMLElement {
  constructor() {
    super();
    this.attachShadow({ mode: "open" });

    this.width = 600;
    this.height = 200;

    this.bendAmount = 40; // how far the string bends upward
    this.duration = 600;  // ms
  }

  connectedCallback() {
    this.render();
    this.animateBend();
  }

  render() {
    const svgNS = "http://www.w3.org/2000/svg";

    const svg = document.createElementNS(svgNS, "svg");
    svg.setAttribute("width", this.width);
    svg.setAttribute("height", this.height);
    svg.setAttribute("viewBox", `0 0 ${this.width} ${this.height}`);
    svg.style.background = "#2b1b0f";

    // Base string (straight)
    this.string = document.createElementNS(svgNS, "path");
    this.string.setAttribute("stroke", "#d0d0d0");
    this.string.setAttribute("stroke-width", "4");
    this.string.setAttribute("fill", "none");
    svg.appendChild(this.string);

    // Note marker
    this.marker = document.createElementNS(svgNS, "circle");
    this.marker.setAttribute("r", 12);
    this.marker.setAttribute("fill", "#ffcc33");
    this.marker.setAttribute("stroke", "#000");
    this.marker.setAttribute("stroke-width", "2");
    svg.appendChild(this.marker);

    this.shadowRoot.appendChild(svg);

    // Initial positions
    this.updateString(0);
  }

  updateString(bend) {
    const y = this.height / 2;
    const cx = this.width * 0.4; // note position
    const cy = y - bend;

    // Draw a curved string using a quadratic Bézier curve
    const path = `
      M 0 ${y}
      Q ${cx} ${cy} ${this.width} ${y}
    `;
    this.string.setAttribute("d", path);

    // Move the marker to the bend apex
    this.marker.setAttribute("cx", cx);
    this.marker.setAttribute("cy", cy);
  }

  animateBend() {
    const start = performance.now();
    const bendAmount = this.bendAmount;
    const duration = this.duration;

    const animate = (now) => {
      const t = (now - start) / duration;

      if (t < 1) {
        // Ease-out bend
        const bend = bendAmount * Math.sin(t * Math.PI * 0.5);
        this.updateString(bend);
        requestAnimationFrame(animate);
      } else {
        // Release back down
        this.releaseBend();
      }
    };

    requestAnimationFrame(animate);
  }

  releaseBend() {
    const start = performance.now();
    const bendAmount = this.bendAmount;
    const duration = this.duration * 0.7;

    const animate = (now) => {
      const t = (now - start) / duration;

      if (t < 1) {
        // Ease-in release
        const bend = bendAmount * (1 - Math.sin(t * Math.PI * 0.5));
        this.updateString(bend);
        requestAnimationFrame(animate);
      } else {
        this.updateString(0);
      }
    };

    requestAnimationFrame(animate);
  }
}

customElements.define("guitar-string-bend-demo", GuitarStringBendDemo);
</script>

</body>
</html>
